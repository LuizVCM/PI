    <script>
 // Função para abrir a página 'formulario.html' após 5 segundos
  function abrirFormulario() {
    setTimeout(function() {
      // Redireciona para a página 'formulario.html' na mesma pasta
      window.location.href = "formulario.html";
    }, 6200); // 6500 milissegundos = 6,2 segundos
  }

  // Executa quando a página carregar
  window.onload = abrirFormulario;
